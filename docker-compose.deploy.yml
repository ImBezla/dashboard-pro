# Produktions-Stack (API + Web). Kopieren: cp .env.deploy.example .env.deploy && Editor
# Start: docker compose --env-file .env.deploy -f docker-compose.deploy.yml up -d --build
#
# Hinweis: API nutzt PostgreSQL (z. B. Supabase). DATABASE_URL in .env.deploy setzen (siehe docs/SUPABASE.md).

services:
  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    # Alle Secrets/URLs aus .env.deploy — ohne ${DATABASE_URL} in YAML (Compose würde $/@ in Werten falsch parsen).
    env_file:
      - .env.deploy
    # Standard: nur localhost (mit nginx/Caddy auf dem VPS davor). Von außen testen: API_PUBLISH_BIND=0.0.0.0
    ports:
      - "${API_PUBLISH_BIND:-127.0.0.1}:${API_PUBLISH_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      CI: "true"
      PORT: "3002"
      PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "${PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK:-0}"
    # Optional: persistenter Speicher (z. B. später lokale Uploads unter /data); DB liegt bei Supabase.
    volumes:
      - dashboardpro_api_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 120s

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL fehlt in .env.deploy}"
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL fehlt in .env.deploy}"
    env_file:
      - .env.deploy
    ports:
      - "${WEB_PUBLISH_BIND:-127.0.0.1}:${WEB_PUBLISH_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  dashboardpro_api_data:
