# Produktions-Stack (API + Web). Kopieren: cp .env.deploy.example .env.deploy && Editor
# Start: docker compose --env-file .env.deploy -f docker-compose.deploy.yml up -d --build
#
# Hinweis: API nutzt PostgreSQL (z. B. Supabase). DATABASE_URL in .env.deploy setzen (siehe docs/SUPABASE.md).

services:
  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    # Standard: nur localhost (mit nginx/Caddy auf dem VPS davor). Von außen testen: API_PUBLISH_BIND=0.0.0.0
    ports:
      - "${API_PUBLISH_BIND:-127.0.0.1}:${API_PUBLISH_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      CI: "true"
      # Postgres/Supabase: Advisory-Lock für migrate deploy aktiv (Standard 0).
      PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "${PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK:-0}"
      # Hinweistext ohne ":" in der Klammer — sonst bricht YAML ("mapping values are not allowed").
      DATABASE_URL: "${postgresql://postgres:Weilbaum_12@db.vsyxumzhxvhnzurugxls.supabase.co:5432/postgres}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET fehlt in .env.deploy}"
      FRONTEND_URL: "${FRONTEND_URL:?FRONTEND_URL fehlt in .env.deploy (https-URL der Web-App)}"
      # Optional: zweite kanonische Web-URL (z. B. www vs. Apex) für CORS — siehe apps/api/src/main.ts
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      ADDITIONAL_CORS_ORIGINS: ${ADDITIONAL_CORS_ORIGINS:-}
      PORT: "3002"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # Gmail ohne SMTP_HOST: muss explizit in den Container (wie SMTP_*)
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # Ohne SMTP: true = sofort Login nach Registrierung (nur intern/testen).
      SKIP_EMAIL_VERIFICATION: ${SKIP_EMAIL_VERIFICATION:-false}
    # Optional: persistenter Speicher (z. B. später lokale Uploads unter /data); DB liegt bei Supabase.
    volumes:
      - dashboardpro_api_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 120s

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL fehlt in .env.deploy}"
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL fehlt in .env.deploy}"
    ports:
      - "${WEB_PUBLISH_BIND:-127.0.0.1}:${WEB_PUBLISH_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET fehlt in .env.deploy muss mit API übereinstimmen}"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  dashboardpro_api_data:
