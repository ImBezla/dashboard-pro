name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dashboardpro
          POSTGRES_PASSWORD: dashboardpro
          POSTGRES_DB: dashboardpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dashboardpro -d dashboardpro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://dashboardpro:dashboardpro@127.0.0.1:5432/dashboardpro?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations (PostgreSQL)
        run: cd apps/api && npx prisma migrate deploy

      - name: Prisma generate
        run: npm run prisma:generate --workspace=@dashboardpro/api

      - name: Lint
        run: npm run lint

      - name: Web TypeScript
        run: npm run typecheck --workspace=@dashboardpro/web

      - name: API unit tests
        run: npm test --workspace=@dashboardpro/api

      - name: Build (Turbo)
        run: npm run build

      - name: Install Playwright (Chromium)
        run: cd apps/web && npx playwright install chromium --with-deps

      - name: E2E smoke (Web)
        run: cd apps/web && CI=1 npx playwright test
        env:
          CI: 'true'
