name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations (SQLite)
        run: cd apps/api && npx prisma migrate deploy
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: Prisma generate
        run: npm run prisma:generate --workspace=@dashboardpro/api
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: Lint
        run: npm run lint

      - name: API unit tests
        run: npm test --workspace=@dashboardpro/api

      - name: Build (Turbo)
        run: npm run build

      - name: Install Playwright (Chromium)
        run: cd apps/web && npx playwright install chromium --with-deps

      - name: E2E smoke (Web)
        run: cd apps/web && CI=1 npx playwright test
        env:
          CI: 'true'
