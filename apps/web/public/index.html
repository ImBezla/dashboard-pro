<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Dashboard Pro</title>
    <meta
      name="description"
      content="Statischer Einstieg. Die Startseite der App liegt unter /."
    />
    <link rel="canonical" href="/" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #fafaf9;
        color: #1c1917;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        line-height: 1.5;
      }
      main {
        max-width: 26rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1.5rem;
        font-size: 0.9375rem;
        color: #57534e;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0.625rem 1.25rem;
        border-radius: 0.375rem;
        font-weight: 500;
        font-size: 0.9375rem;
        text-decoration: none;
        color: #fff;
        background: #1c1917;
      }
      a:hover {
        background: #292524;
      }
      a:focus-visible {
        outline: 2px solid #78716c;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dashboard Pro</h1>
      <p>
        Diese Seite ist nur der statische Einstieg unter <code>/index.html</code>. Die eigentliche
        Oberfläche liegt unter der Start-URL der App.
      </p>
      <a href="/">Zur Startseite</a>
    </main>
  </body>
</html>
